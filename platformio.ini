[platformio]
default_envs = seeed_xiao_esp32c3_usb

[env:seeed_xiao_esp32c3_usb]
platform = espressif32@6.13.0
board = seeed_xiao_esp32c3
framework = arduino
board_build.partitions = partitions_ota.csv

monitor_speed = 115200
upload_speed = 115200
upload_protocol = esptool
upload_flags =
    --before
    default_reset
    --after
    hard_reset

lib_deps =
    adafruit/Adafruit NeoPixel
    knolleary/PubSubClient@2.8.0
    bblanchon/ArduinoJson@6.20.0
    adafruit/RTClib @ ^2.1.4

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DCONFIG_FREERTOS_HZ=1000
    -DFIRMWARE_VERSION=\"0.2.40\"
    -DOTA_CHANNEL=\"stable\"
    ; Optional API-Key Schutz fuer schreibende Endpoints.
    ; Leer lassen = deaktiviert (kompatibel mit aktueller Web-UI).
    ; Beispiel aktiv: -DWC_API_KEY=\"meinGeheimerKey\"
    -DWC_API_KEY=\"\"

[env:seeed_xiao_esp32c3_ota]
platform = espressif32@6.13.0
board = seeed_xiao_esp32c3
framework = arduino
board_build.partitions = partitions_ota.csv

monitor_speed = 115200
upload_protocol = espota
; Setze hier die IP-Adresse deiner WordClock (z.B. 192.168.1.100)
; oder verwende hostname (z.B. wordclock.local)
upload_port = 192.168.178.73
upload_flags =
    --auth=update123

lib_deps =
    adafruit/Adafruit NeoPixel
    knolleary/PubSubClient@2.8.0
    bblanchon/ArduinoJson@6.20.0
    adafruit/RTClib @ ^2.1.4

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DCONFIG_FREERTOS_HZ=1000
    -DFIRMWARE_VERSION=\"0.2.40\"
    -DOTA_CHANNEL=\"stable\"
    ; Optional API-Key Schutz fuer schreibende Endpoints.
    ; Leer lassen = deaktiviert (kompatibel mit aktueller Web-UI).
    ; Beispiel aktiv: -DWC_API_KEY=\"meinGeheimerKey\"
    -DWC_API_KEY=\"\"
