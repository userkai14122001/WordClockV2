name: Firmware Release

run-name: Firmware Release ${{ github.ref_name }}

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PUSH_TOKEN != '' && secrets.RELEASE_PUSH_TOKEN || github.token }}

      - name: Derive release variables
        id: vars
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Sync FIRMWARE_VERSION to tag
        env:
          RELEASE_VERSION: ${{ steps.vars.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["RELEASE_VERSION"]
          path = Path("platformio.ini")
          text = path.read_text(encoding="utf-8")
          text, count = re.subn(r'-DFIRMWARE_VERSION=\\"[^\\"]*\\"', f'-DFIRMWARE_VERSION=\\"{version}\\"', text)
          if count < 1:
              raise SystemExit("No FIRMWARE_VERSION build flag found in platformio.ini")
          path.write_text(text, encoding="utf-8")
          print(f"Updated {count} FIRMWARE_VERSION entries to {version}")
          PY

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: platformio run -e seeed_xiao_esp32c3_usb

      - name: Compute firmware SHA256
        id: sha
        run: |
          SHA256="$(sha256sum .pio/build/seeed_xiao_esp32c3_usb/firmware.bin | awk '{print $1}')"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          files: .pio/build/seeed_xiao_esp32c3_usb/firmware.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update OTA manifest on main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.vars.outputs.tag }}
          VERSION: ${{ steps.vars.outputs.version }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
        run: |
          set -euo pipefail

          AUTH_TOKEN="${{ secrets.RELEASE_PUSH_TOKEN != '' && secrets.RELEASE_PUSH_TOKEN || github.token }}"
          git remote set-url origin "https://x-access-token:${AUTH_TOKEN}@github.com/${REPO}.git"

          git fetch origin main
          git checkout -B main origin/main

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest_path = Path("ota_manifest.json")
          data = {}
          if manifest_path.exists():
              data = json.loads(manifest_path.read_text(encoding="utf-8"))

          channels = data.get("channels")
          if not isinstance(channels, dict):
              channels = {}

          repo = os.environ["REPO"]
          tag = os.environ["TAG"]
          version = os.environ["VERSION"]
          sha256 = os.environ["SHA256"].lower()
          firmware_url = f"https://github.com/{repo}/releases/download/{tag}/firmware.bin"

          note = f"Automated release {version}"

          channels["stable"] = {
              "version": version,
              "firmware_url": firmware_url,
              "sha256": sha256,
              "status": "ready",
              "notes": note,
          }

          if "beta" not in channels or not isinstance(channels["beta"], dict):
              channels["beta"] = {
                  "version": version,
                  "firmware_url": firmware_url,
                  "sha256": sha256,
                  "status": "hold",
                  "notes": "Beta roll-out currently paused",
              }

          out = {"channels": channels}
          manifest_path.write_text(json.dumps(out, indent=2, ensure_ascii=True) + "\n", encoding="utf-8")
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ota_manifest.json
          if git diff --cached --quiet; then
            echo "ota_manifest.json unchanged"
          else
            git commit -m "chore: update OTA manifest for $TAG"
            if ! git push origin HEAD:main; then
              echo "::error::Push to main failed. Configure repository secret RELEASE_PUSH_TOKEN with a PAT that has contents:write permission."
              exit 1
            fi
          fi

          # Hard verification: fail the release workflow if remote manifest is not aligned.
          git fetch origin main
          git show origin/main:ota_manifest.json > /tmp/remote_manifest.json
          python - <<'PY'
          import json
          import os

          version = os.environ["VERSION"]
          tag = os.environ["TAG"]
          expected_sha = os.environ["SHA256"].lower()
          expected_url_suffix = f"/releases/download/{tag}/firmware.bin"

          with open("/tmp/remote_manifest.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          stable = data.get("channels", {}).get("stable", {})
          problems = []
          if stable.get("version") != version:
              problems.append(f"stable.version={stable.get('version')} expected={version}")
          url = stable.get("firmware_url", "")
          if expected_url_suffix not in url:
              problems.append(f"stable.firmware_url={url} expected suffix={expected_url_suffix}")
          if str(stable.get("sha256", "")).lower() != expected_sha:
              problems.append("stable.sha256 mismatch")
          if str(stable.get("status", "")).lower() != "ready":
              problems.append(f"stable.status={stable.get('status')} expected=ready")

          if problems:
              raise SystemExit("Manifest verification failed: " + "; ".join(problems))

          print("Remote manifest verification succeeded")
          PY
